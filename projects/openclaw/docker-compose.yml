services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    user: "1000:100"
    env_file: .env
    environment:
      - PATH=$PATH:/app/node_modules/.bin
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GATEWAY_PORT=18789
      - GATEWAY_HOST=0.0.0.0
      - HOST=0.0.0.0
      - CLAW_HOST=0.0.0.0
      - GIT_USERNAME=${GIT_USERNAME}
      - GIT_TOKEN=${GIT_TOKEN}
      - GIT_SSH_COMMAND=ssh -o UserKnownHostsFile=/home/node/.ssh/known_hosts -i /home/node/.ssh/id_ed25519
    volumes:
      - /share/openclaw_memory:/home/node/projects
      - ./config:/home/node/.openclaw
      - /share/Container/stacks/.ssh/id_ed25519:/home/node/.ssh/id_ed25519:ro
      - /share/Container/stacks/.ssh/known_hosts:/home/node/.ssh/known_hosts:ro
    networks:
      - infra_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclaw.rule=Host(`openclaw.${DOMAIN}`) || Host(`openclaw.${TAIL_ID}.ts.net`)"
      - "traefik.http.routers.openclaw.entrypoints=web"
      - "traefik.http.services.openclaw.loadbalancer.server.port=18789"
      - "tsdproxy.enable=true"
      - "tsdproxy.name=openclaw"
      - "tsdproxy.target=traefik"
      - "tsdproxy.container_port=80"

networks:
  infra_network:
    external: true
