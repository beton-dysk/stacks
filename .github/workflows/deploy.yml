name: Deploy Stacks

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for Access Stack
        run: |
          echo "CLOUDFLARE_TUNNEL_TOKEN=${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}" > access/.env
          echo "DOMAIN=${{ secrets.DOMAIN }}" >> access/.env
          echo "TSDPROXY_AUTHKEY=${{ secrets.TSDPROXY_AUTHKEY }}" >> access/.env

      - name: Deploy Access Stack
        run: |
          cd access
          docker compose pull
          docker compose up -d --remove-orphans
